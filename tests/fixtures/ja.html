<h1>第一話　異世界への扉</h1>
<p>目を覚ますと、そこは見知らぬ森の中だった。</p>
<p>「ここは……どこだ？」</p>
<p>佐藤健一は頭を押さえながら立ち上がった。昨日までは東京の小さなアパートで暮らす、ごく普通の会社員だったはずだ。</p>
<p>空を見上げると、<b>二つの月</b>が浮かんでいた。それは明らかに、地球ではあり得ない光景だった。</p>
<p>「ステータス・オープン」</p>
<p>なぜかその言葉が自然に口から出た。目の前に半透明の<i>ウィンドウ</i>が現れ、そこには彼の名前と、見たこともない数値が並んでいた。</p>
<p>遠くから、狼のような遠吠えが聞こえてくる。健一の異世界での生活は、こうして始まったのだった。</p>
