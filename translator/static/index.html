<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Translator — Dashboard</title>
    <script>
      function getTheme() {
        try {
          const stored = localStorage.getItem("theme");
          if (stored === "light" || stored === "dark") {
            return stored;
          }
          const dark = matchMedia("(prefers-color-scheme: dark)").matches;
          return dark ? "dark" : "light";
        } catch {
          return "dark";
        }
      }
      document.documentElement.dataset.theme = getTheme();
    </script>
    <link rel="icon" href="static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="static/app.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="brand">translator<small id="version"></small></div>
        <nav id="nav"></nav>
        <div class="sidebar-footer">
          <a href="docs" target="_blank" rel="noopener">API docs ↗</a>
        </div>
      </aside>
      <div class="backdrop" id="backdrop"></div>

      <div class="content">
        <div class="topbar">
          <button class="menu-btn" id="menu-btn" aria-label="Open menu">
            ☰
          </button>
          <h1 id="page-title">Dashboard</h1>
          <span id="health-badge" class="badge" aria-live="polite">…</span>
          <button
            class="icon-btn"
            id="theme-btn"
            aria-label="Toggle theme"
          ></button>
        </div>
        <main id="views" tabindex="-1"></main>
      </div>
    </div>

    <div id="toast" role="status" aria-live="polite" aria-atomic="false"></div>

    <script type="module" src="static/js/app.js"></script>
  </body>
</html>
