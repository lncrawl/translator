# OPTIONAL — without a config file the service uses built-in defaults
# (translator/defaults.py) covering everything below; engines enable
# themselves when their key env var is set. Copy to config.yml (or point
# $TRANSLATOR_CONFIG at it) only to customize.
#
#   providers:  an account at an API host — credentials + shared rate limits
#   engines:    one model on one provider — what routing lanes reference
#   routing:    ordered fallback lanes per task type
#
# Keys stay in env vars, never in this file. Everything is also editable at
# runtime via the web UI at / or the config API (docs/deployment.md); see
# docs/translation-engines.md for provider research.

providers:
  # Local NLLB (Meta's NLLB-200 via CTranslate2, in-process on CPU).
  # No API key — always available.
  - id: local-nllb
    kind: nllb

  # z.ai — free GLM flash, no token cap (~1 req/s). Best free CJK→EN primary.
  - id: zai
    kind: openai
    base_url: https://api.z.ai/api/paas/v4
    api_key_env: ZAI_API_KEY
    rps: 1
    max_concurrency: 1

  # aistudio.google.com — top quality; quotas volatile.
  - id: gemini
    kind: openai
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key_env: GEMINI_API_KEY
    rpm: 10
    max_concurrency: 2

  # openrouter.ai — 50 req/day free (1,000/day after one-time $10 credit);
  # free model lineup churns monthly.
  # - id: openrouter
  #   kind: openai
  #   base_url: https://openrouter.ai/api/v1
  #   api_key_env: OPENROUTER_API_KEY
  #   rpm: 20
  #   max_concurrency: 1

  # cloud.cerebras.ai — 1M tokens/day free, very fast.
  # - id: cerebras
  #   kind: openai
  #   base_url: https://api.cerebras.ai/v1
  #   api_key_env: CEREBRAS_API_KEY
  #   rpm: 5
  #   max_concurrency: 1

  # deepl.com/pro-api — NMT for short strings; card required at signup.
  # - id: deepl
  #   kind: deepl
  #   api_key_env: DEEPL_API_KEY
  #   monthly_chars: 500000

engines:
  # Local fallback. `model` is a HF repo with a CTranslate2 conversion (or a
  # local dir); ~1.4 GB downloaded on first use, cached under $HF_HOME.
  # Sentence-level NMT: no glossary/context; HTML via segment extraction.
  - id: nllb
    provider: local-nllb
    model: OpenNMT/nllb-200-distilled-1.3B-ct2-int8
    # extra_body:
    #   beam_size: 4  # better output, ~2x CPU time (default 2)

  - id: zai-glm-flash
    provider: zai
    model: glm-4.7-flash
    max_input_tokens: 200000

  - id: gemini-flash
    provider: gemini
    model: gemini-2.5-flash
    max_input_tokens: 250000

  # Engines on one provider share its rate limits and quota.
  # - id: or-nemotron
  #   provider: openrouter
  #   model: nvidia/nemotron-3-super-120b-a12b:free
  #   max_input_tokens: 100000
  # - id: or-qwen
  #   provider: openrouter
  #   model: qwen/qwen3.5-235b-a22b:free
  #   max_input_tokens: 100000

  # - id: cerebras-glm
  #   provider: cerebras
  #   model: zai-glm-4.7
  #   max_input_tokens: 30000

  # - id: deepl
  #   provider: deepl

# Lanes are tried in order; benched engines (quota, repeated failures) are
# skipped. Keep keyless NLLB last so the service always answers.
routing:
  chapter: [zai-glm-flash, gemini-flash, nllb]
  short_text: [zai-glm-flash, gemini-flash, nllb]

# Defaults shown. After `failure_threshold` consecutive failures an engine
# is benched for `cooldown_seconds`.
# failure_policy:
#   transient_retries: 2
#   backoff_base_seconds: 2.0
#   failure_threshold: 3
#   cooldown_seconds: 300
