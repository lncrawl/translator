name: Bump Version

on:
  workflow_dispatch:

jobs:
  bump:
    name: Bump version and push tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: true

      # setup-uv stopped publishing floating major tags after v7 — pin exact.
      - uses: astral-sh/setup-uv@v8.3.2

      - name: Read target version from CHANGELOG
        id: changelog
        run: |
          version=$(grep -m1 '^## \[' CHANGELOG.md | sed 's/## \[//;s/\].*//')
          if [ -z "$version" ]; then
            echo "::error::No '## [x.y.z]' entry found in CHANGELOG.md."
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "Target version from CHANGELOG: $version"

      - name: Fail if tag already exists
        run: |
          version="${{ steps.changelog.outputs.value }}"
          if git tag --list "v$version" | grep -q .; then
            echo "::error::Tag v$version already exists. Add a new version entry to CHANGELOG.md before releasing."
            exit 1
          fi
          echo "Tag v$version does not exist, proceeding."

      - name: Set version in pyproject.toml
        run: uv version "${{ steps.changelog.outputs.value }}"

      - name: Commit and tag
        uses: EndBug/add-and-commit@v10
        with:
          add: "pyproject.toml uv.lock"
          tag: "v${{ steps.changelog.outputs.value }}"
          message: "Bump version to v${{ steps.changelog.outputs.value }}"

      - name: Trigger release workflow
        run: |
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --field tag="v${{ steps.changelog.outputs.value }}"
        env:
          GH_TOKEN: ${{ secrets.LNCRAWL_PAT }}
