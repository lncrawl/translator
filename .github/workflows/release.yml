name: Release

# Triggered explicitly by bump.yml after the tag is pushed (workflow_dispatch),
# or when a v* tag is pushed manually. Using workflow_dispatch as the primary
# path avoids relying on GITHUB_TOKEN tag-push side-effects.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release
        required: true
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.tag.outputs.name }}

      # setup-uv stopped publishing floating major tags after v7 — pin exact.
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"

      - name: Install
        run: uv sync --all-groups --all-extras

      - name: Verify tag matches package version
        run: |
          tag="${{ steps.tag.outputs.name }}"
          tag_version="${tag#v}"
          pkg_version="$(uv version | awk '{print $NF}')"
          echo "tag=$tag_version package=$pkg_version"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $tag does not match package version $pkg_version"
            exit 1
          fi

      - name: Build distributions
        run: uv build

      - name: Check metadata renders on PyPI
        run: uvx twine check dist/*

      - name: Extract changelog notes
        run: |
          tag="${{ steps.tag.outputs.name }}"
          version="${tag#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md | sed '/^\[.*\]: http/d' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::CHANGELOG.md has no entry for $tag."
            echo "::error::Add a '## [$version] - YYYY-MM-DD' section and push it to main."
            exit 1
          fi
          echo "----- release notes -----"
          cat release-notes.md

      - name: Detect pre-release
        id: meta
        run: |
          tag="${{ steps.tag.outputs.name }}"
          version="${tag#v}"
          if echo "$version" | grep -qE '[0-9](a|b|rc)[0-9]+|\.dev[0-9]+'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}

      - name: Trigger publish workflow
        run: |
          gh workflow run publish.yml \
            --repo "${{ github.repository }}" \
            --field tag="${{ steps.tag.outputs.name }}"
        env:
          GH_TOKEN: ${{ secrets.LNCRAWL_PAT }}
