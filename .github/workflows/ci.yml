name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # setup-uv stopped publishing floating major tags after v7 — pin exact.
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run poe lint-check

      - name: Type check
        run: uv run poe typecheck

      - name: Test
        run: uv run poe test

  docker:
    # PRs only: pushes to main already build in the publish workflow.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -t translator:ci .
