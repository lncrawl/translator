services:
  translator:
    # Published on every push to main.
    # For local build run `docker compose up -d --build`
    image: ghcr.io/lncrawl/translator:latest
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Config API changes and the downloaded NLLB fallback model persist
      # in this volume. To provide your own config file instead, bind-mount
      # a directory over /data.
      - translator-data:/data
    environment:
      # Provider API keys are configured remotely (web UI at / or the
      # config API) and persist in the volume; only service-level
      # settings come from the environment.
      - AUTH_TOKEN
      - ADMIN_TOKEN
      - LOG_LEVEL
    restart: unless-stopped

volumes:
  translator-data:
