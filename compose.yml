services:
  translator:
    # Published on every push to main.
    # For local build run `docker compose up -d --build`
    image: ghcr.io/lncrawl/translator:latest
    build: .
    ports:
      - "8184:8184"
    volumes:
      # Holds config.yml; bind-mount a directory over /data to
      # provide your own config.
      - translator-data:/data
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped

volumes:
  translator-data:
