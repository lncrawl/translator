services:
  translator:
    # Published on every push to main.
    # For local build run `docker compose up -d --build`
    image: ghcr.io/lncrawl/translator:latest
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Config API changes and the downloaded NLLB fallback model persist
      # in this volume. To provide your own config file instead, bind-mount
      # a directory over /data.
      - translator-data:/data
    environment:
      # Pass through whichever engine keys you have set on the host
      # (every api_key_env referenced in config.example.yml).
      - ZAI_API_KEY
      - GEMINI_API_KEY
      - CEREBRAS_API_KEY
      - MISTRAL_API_KEY
      - GROQ_API_KEY
      - OPENROUTER_API_KEY
      - DEEPL_API_KEY
      - AUTH_TOKEN
      - ADMIN_TOKEN
      - LOG_LEVEL
    restart: unless-stopped

volumes:
  translator-data:
