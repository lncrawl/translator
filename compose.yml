services:
  translator:
    # Published on every push to main.
    # For local build run `docker compose up -d --build`
    image: ghcr.io/lncrawl/translator:latest
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Holds config.yml and the downloaded NLLB model; bind-mount a
      # directory over /data to provide your own config.
      - translator-data:/data
    environment:
      # Provider API keys are configured remotely and persist in the volume.
      # Override the default admin token before exposing beyond localhost.
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-changeme}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped

volumes:
  translator-data:
